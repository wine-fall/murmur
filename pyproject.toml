[project]
name = "murmur"
version = "0.0.1"
description = "A fully-local, personal-use companion radio with Claude as its brain."
requires-python = ">=3.10"
# spec 01 step 2 introduces the first third-party dependency: claude-agent-sdk
# (the real Brain, via the local Claude Code subscription OAuth — no API key).
# The stub VoiceProvider + StubBrain still run on the stdlib alone, so the fast
# test layer (DESIGN §11.1) needs no network. A real TTS adapter lands in spec 02.
dependencies = [
    "claude-agent-sdk>=0.2.110",
]

[project.optional-dependencies]
# Dev tooling. Install with:  pip install -e ".[dev]"  then  pre-commit install
# The English-only-comment hook itself is stdlib-only (no install needed); this
# is just the automation harness around it.
dev = [
    "pre-commit>=3.5",
    "pytest>=8",
    "ruff>=0.15",
]
# Optional TTS voice backends — ONE extra per backend, so a user installs only
# the heavy deps for the voice(s) they actually use. The core, the unit suite,
# and the stub/sidecar-fake voices need NONE of these (they run model-free).
# L0 wires only Qwen3-TTS; the seam (SynthesisRequest / TtsBackend / sidecar) is
# model-agnostic, so future backends each just add their own extra and a
# build_backend name — e.g. tts-cosyvoice2 / tts-chatterbox / tts-fish — without
# touching the core. Extras may share a runtime lib (several MLX models reuse
# mlx-audio); they are named by backend because users pick a voice, not a runtime.
#
# Qwen3-TTS runs on the MLX runtime (Apple-Silicon-only). Install on a Mac:
#   pip install -e ".[tts-qwen3]"   then run:  murmur --voice qwen3
tts-qwen3 = [
    "mlx-audio>=0.4.4",  # the MLX TTS runtime that hosts Qwen3-TTS
]

[tool.pytest.ini_options]
testpaths = ["tests"]
# Async tests wrap their coroutine in asyncio.run(), so no asyncio plugin is needed.
# Integration tests (real TTS model, etc.) are tagged and excluded by default
# (DESIGN §11.2) — run them deliberately with:  pytest -m integration
addopts = "-m 'not integration'"
markers = [
    "integration: heavy/real-model tests, run on demand (not in the fast loop)",
]

[tool.ruff]
# Project-owned formatting so it's deterministic across machines/editors instead
# of relying on an editor's bundled default. Black-compatible defaults.
line-length = 88
target-version = "py310"

[project.scripts]
murmur = "murmur.app:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/murmur"]
